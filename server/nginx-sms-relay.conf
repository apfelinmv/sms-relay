server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/sms-relay/tls.crt;
    ssl_certificate_key /etc/sms-relay/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;

    access_log off;

    location = /sms {
        limit_except POST { deny all; }
        client_max_body_size 24k;
        proxy_pass http://127.0.0.1:8766/sms;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location = /configure {
        limit_except POST { deny all; }
        client_max_body_size 8k;
        proxy_pass http://127.0.0.1:8766/configure;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 3s;
        proxy_read_timeout 20s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8766/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }
}
